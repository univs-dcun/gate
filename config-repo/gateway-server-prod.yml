server:
  port: 8080
  # ===============================
  # SSL
  # ===============================
  ssl:
    enabled: false

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - https://univsgate.com
                  - https://api.univsgate.com
                  - https://demo.univsgate.com
                allow-credentials: true
                allowedHeaders:
                  - Authorization
                  - Content-Type
                  - X-Api-Key
                  - Accept-Language
                  - Accept-TimeZone
                  - Upgrade
                  - Connection
                allowedMethods:
                  - POST
                  - GET
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                  - HEAD
          routes:
            - id: AUTH-REFRESH-TOKEN-CHANGE-PASSWORD
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/token/refresh, /api/v1/auth/password/change
            - id: AUTH
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: GATE-PROJECT
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/projects/**
              filters:
                - AuthenticationFilter
            - id: GATE-API-KEY
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/api-keys/**
              filters:
                - AuthenticationFilter
            - id: GATE-COMPANY
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/company/**
              filters:
                - AuthenticationFilter
            - id: GATE-USER
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - AuthenticationFilter
            - id: GATE-MATCH
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/match/**
              filters:
                - AuthenticationFilter
            - id: GATE-DEMO
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/demo/**
            - id: GATE-SDK-QR
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/sdk/user/qr, /api/v1/sdk/verify/qr/**, /api/v1/sdk/identify/qr, /api/v1/sdk/liveness/qr
              filters:
                - AuthenticationFilter
            - id: GATE-SDK
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/sdk/**
            - id: GATE-DASHBOARD
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/dashboard/**
              filters:
                - AuthenticationFilter
            - id: GATE-FILE
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/file
            - id: KYC-MESSAGES
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/messages/**
            - id: NOTIFY-WEB-SOCKET
              uri: lb:ws://notify-service
              predicates:
                - Path=/ws/**

# ===============================
# Eureka client
# ===============================
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka

# ===============================
# Management
# ===============================
management:
  endpoint:
    shutdown:
      # true: 안전하게 종료
      enabled: true
  endpoints:
    web:
      exposure:
        # 해당 라이브러리가 제공하는 API 종류 (기본적으로 health 제공)
        include: refresh, health, info, prometheus

# ===============================
# Gateway Logging
# ===============================
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG