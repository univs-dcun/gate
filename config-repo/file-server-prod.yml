# If the code you are adding is new and does not belong to any existing section below,
# please add it at the bottom of this file.

server:
  port: 0
  # ===============================
  # Grafana metric
  # ===============================
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  # ===============================
  # File size limit
  # ===============================
  servlet:
    multipart:
      max-file-size: 4GB
      max-request-size: 4GB

# ===============================
# Eureka client
# ===============================
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka

# ===============================
# Management
# ===============================
management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      base-path: /file/actuator
      exposure:
        include: refresh, health, info, prometheus

# ===============================
# I18n (Internationalization)
# ===============================
message:
  redis:
    host: host
    port: port
    password: password

# ===============================
# Path & Encryption
# ===============================
file:
  root-path: filepath
  secret-key: secretkey
  algorithm:
    way: way
    mod: mod