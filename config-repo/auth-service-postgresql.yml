spring:
  # ===============================
  # Activation Oracle or Postgresql
  # ===============================
  config:
    activate:
      on-profile: postgresql

  # ===============================
  # Database
  # ===============================
  datasource:
    driverClassName: org.postgresql.Driver
    url: url
    username: username
    password: password

  # ===============================
  # Spring Data Jpa
  # ===============================
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
