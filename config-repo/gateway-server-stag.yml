# If the code you are adding is new and does not belong to any existing section below,
# please add it at the bottom of this file.

server:
  port: 8080
  # ===============================
  # Grafana metric
  # ===============================
  tomcat:
    mbeanregistry:
      access: unrestricted
  # ===============================
  # SSL
  # ===============================
  ssl:
    enabled: false

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - https://stage.univsgate.com
                  - https://api-stage.univsgate.com
                  - https://demo-stage.univsgate.com
                allow-credentials: true
                allowedHeaders:
                  - Authorization
                  - Content-Type
                  - X-Api-Key
                  - Accept-Language
                  - Accept-TimeZone
                  - Upgrade
                  - Connection
                allowedMethods:
                  - POST
                  - GET
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                  - HEAD
          routes:
            - id: AUTH-REFRESH-TOKEN-CHANGE-PASSWORD
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/token/refresh, /api/v1/auth/password/change
            - id: AUTH
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: GATE-PROJECT
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/projects/**
              filters:
                - AuthenticationFilter
            - id: GATE-API-KEY
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/api-keys/**
              filters:
                - AuthenticationFilter
            - id: GATE-COMPANY
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/company/**
              filters:
                - AuthenticationFilter
            - id: GATE-FEATURE
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/feature/**
              filters:
                - AuthenticationFilter
            - id: GATE-MATCH
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/match/**
              filters:
                - AuthenticationFilter
            - id: GATE-DEMO
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/demo/**
            - id: GATE-DASHBOARD
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/dashboard/**
              filters:
                - AuthenticationFilter
            - id: GATE-FILE
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/file
            - id: KYC-MESSAGES
              uri: lb://gate-service
              predicates:
                - Path=/api/v1/messages/**
            - id: NOTIFY-WEB-SOCKET
              uri: lb:ws://notify-service
              predicates:
                - Path=/ws/**

# ===============================
# Eureka client
# ===============================
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka

# ===============================
# Management
# ===============================
management:
  endpoint:
    shutdown:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: refresh, health, info, prometheus

# ===============================
# Gateway Logging
# ===============================
logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: OFF
    org.springframework.http.server.reactive: INFO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG