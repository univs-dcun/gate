# If the code you are adding is new and does not belong to any existing section below,
# please add it at the bottom of this file.

server:
  port: 0
  # ===============================
  # Grafana metric
  # ===============================
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  # ===============================
  # Kafka
  # ===============================
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # ===============================
  # Feign client
  # ===============================
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic

  # ===============================
  # Database
  # ===============================
  datasource:
    driverClassName: org.mariadb.jdbc.Driver
    url: url
    username: username
    password: password

  # ===============================
  # Database version Management
  # ===============================
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===============================
  # pagination
  # ===============================
  data:
    web:
      pageable:
        one-indexed-parameters: true
        default-page-size: 10

  # ===============================
  # File size limit
  # ===============================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ===============================
# Eureka client
# ===============================
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka

# ===============================
# Management
# ===============================
management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      base-path: /device/actuator
      exposure:
        include: refresh, health, info, prometheus

# ===============================
# I18n (Internationalization)
# ===============================
message:
  redis:
    host: host
    port: port
    password: password

# ===============================
# Kafka topic
# groupId : <'service name'>-consumer[-'environment']
# topic   : serviceName.method.env
# ===============================
app:
  kafka:
    noti:
      device:
        topics: prod-notification-device