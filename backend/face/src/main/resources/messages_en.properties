# Swagger
UNAUTHORIZED=A request was attempted without authentication.
NEED_SERVICE_ROLE=Authorization is required to use this service.
NOT_FOUND=Your information requested to server is wrong. Please double-check the request information.
METHOD_NOT_ALLOWED=This is not a supported request. Please double-check the request information.
INTERNAL_SERVER_ERROR=There has been an error with the Universe platform.

# Validation Messages
INVALID_INPUT=The user's request contains invalid values.
REQUIRED_BRANCH_NAME=Descriptor branch name is required.
INVALID_BRANCH_NAME_LENGTH=Descriptor branch name must be between 1 and 255 characters.
REQUIRED_FACE_ID=Face ID is required.
INVALID_FACE_ID_LENGTH=Face ID must be between 1 and 255 characters.
INVALID_FILE=Invalid file. Please check the file or file format.

# ProcessType Messages
NOT_FACE_IMAGE=Please try again with a different image that contains the user's face.
NOT_MATCH=The user is not registered. Please try again.
MISMATCH=Please submit the request using the same individual's facial info(image or descriptor).
NO_DOUBLE_SIMILARITY=Please try again with a different image.
TOO_MANY_FACES=There is more than one face on the image.
FACE_NOT_FOUND=No faces are found on the image.
