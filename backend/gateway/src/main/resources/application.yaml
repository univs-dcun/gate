spring:
  application:
    name: gateway-server
  config:
    import: optional:configserver:http://config-server:8888

---

server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  config:
    activate:
      on-profile: local
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false