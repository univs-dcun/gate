<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
  <meta charset="UTF-8">
  <title th:text="#{RESET_PASSWORD_TITLE}"></title>
</head>
<body style="margin:0; padding:0; background-color:#ffffff; font-family: Arial, Helvetica, sans-serif; color:#000000;">

<table width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td align="center">

      <table width="600" cellpadding="0" cellspacing="0" style="font-family:Arial, sans-serif;color:#000000;">

              <tr>
                <td align="center"
                    style="
                      background-color:#e0e0e0;
                      padding:20px;
                      font-size:28px;
                      font-weight:bold;
                      letter-spacing:4px;
                    "
                    th:text="${verificationCode}"></td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Spacing -->
        <tr><td height="30"></td></tr>

        <tr>
          <td style="font-size:13px; line-height:1.6; color:#333333;" th:text="#{RESET_PASSWORD_3}"></td>

          <td style="font-size:13px; line-height:1.6; color:#333333;" th:text="#{RESET_PASSWORD_5}"></td>
        </tr>
        <tr>
          <td style="font-size:13px; line-height:1.6; color:#333333;" th:text="#{RESET_PASSWORD_6}"></td>
        </tr>

        <tr><td height="10"></td></tr>

        <tr>
          <td style="font-size:13px; line-height:1.6; color:#333333;" th:text="#{RESET_PASSWORD_7}"></td>
        </tr>

        <!-- Spacing -->
        <tr><td height="40"></td></tr>

        <!-- Footer -->
        <tr>
          <td style="font-size:11px; color:#999999;">
            UNIVS<br/>
            © 2026 UNIVS. All rights reserved.

        </tr>

      </table>

</html>
