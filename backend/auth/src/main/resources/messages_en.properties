# Swagger
UNAUTHORIZED=A request was attempted without authentication.
NEED_SERVICE_ROLE=Authorization is required to use this service.
NOT_FOUND=Your information requested to server is wrong. Please double-check the request information.
METHOD_NOT_ALLOWED=This is not a supported request. Please double-check the request information.
INTERNAL_SERVER_ERROR=There has been an error with the Univs platform.

# Common
INVALID_INPUT=The user's request contains invalid values.

# Auth
RETRY_USER_AUTHENTICATION=Authentication required. Please login again.
INSUFFICIENT_PERMISSION=You do not have sufficient permission to perform this action.
EXPIRATION_TOKEN=Token has expired. Please login again.
EXPIRATION_REFRESH_TOKEN=Refresh token has expired. Please login again.
INVALID_ACCESS_TOKEN=Access token is invalid.
INVALID_REFRESH_TOKEN=Refresh token is invalid.
INVALID_TOKEN_TYPE=Token type is invalid.
INVALID_REFRESH_TOKEN_TYPE=Refresh token type is invalid.
FAILED_WRONG_PASSWORD=Incorrect password. Please try again.
FAILED_ACCOUNT_LOCKED=This account has been locked. Please contact support.
FAILED_ACCOUNT_NOT_FOUND=Account not found. Please check your email.
FAILED_CONFIRM_PASSWORD=Password and password confirmation do not match.
ALREADY_USED_PASSWORD_RESET_TOKEN=This password reset link has already been used.
ALREADY_USED_PASSWORD=New password cannot be the same as the current password.
SUCCESS_PASSWORD_CHANGE=Password has been changed successfully.
NOT_FOUND_VERIFICATION=No verification record found. Please request a new code.
EXPIRED_VERIFICATION=Verification code has expired. Please request a new code.
TOO_MANY_ATTEMPTS_VERIFICATION=Too many verification attempts. Please request a new code.
INVALID_VERIFICATION_CODE=Verification code is incorrect.
SUCCESS_SEND_EMAIL_CODE=Verification code has been sent to your email.
SUCCESS_VERIFY_EMAIL=Email has been verified successfully.
NOT_EMAIL_VERIFIED=Email verification is required before signing up.
ALREADY_USE_EMAIL=This email is already in use.

# Validation
REQUIRED_EMAIL=Email is required.
INVALID_EMAIL_LENGTH=Email must not exceed 255 characters.
INVALID_EMAIL_FORMAT=Please enter a valid email format.
REQUIRED_PASSWORD=Password is required.
INVALID_PASSWORD_LENGTH=Password must not exceed 255 characters.
REQUIRED_REFRESH_TOKEN=Refresh token is required.
INVALID_REFRESH_TOKEN_LENGTH=Refresh token must not exceed 255 characters.
REQUIRED_ACCOUNT_ID=Account ID is required.
INVALID_ACCOUNT_ID=Account ID is invalid.
REQUIRED_NEW_PASSWORD=New password is required.
INVALID_NEW_PASSWORD_LENGTH=New password must not exceed 255 characters.
REQUIRED_PASSWORD_CONFIRM=Password confirmation is required.
INVALID_PASSWORD_CONFIRM_LENGTH=Password confirmation must not exceed 255 characters.
REQUIRED_CODE=Verification code is required.
INVALID_CODE_LENGTH=Verification code must be exactly 8 characters.
REQUIRED_ACCESS_TOKEN=Access token is required.
INVALID_ACCESS_TOKEN_LENGTH=Access token is invalid.

