# Swagger
UNAUTHORIZED=인증 없이 요청을 시도했습니다.
NEED_SERVICE_ROLE=서비스를 사용할 권한이 필요합니다.
NOT_FOUND=잘못된 접근 요청 정보입니다. 요청 정보를 다시 확인해 주시기 바랍니다.
METHOD_NOT_ALLOWED=지원하지 않은 요청입니다. 요청 정보를 다시 확인해 주시기 바랍니다.
INTERNAL_SERVER_ERROR=유니버스 플랫폼에서 오류가 발생하였습니다.

# Common
INVALID_INPUT=유효하지 않은 값이 포함된 사용자의 요청입니다.

# Auth
RETRY_USER_AUTHENTICATION=다시 로그인해주세요.
INSUFFICIENT_PERMISSION=해당 작업을 수행할 권한이 없습니다.
EXPIRATION_TOKEN=토큰이 만료되었습니다. 다시 로그인해 주세요.
EXPIRATION_REFRESH_TOKEN=리프레시 토큰이 만료되었습니다. 다시 로그인해 주세요.
INVALID_ACCESS_TOKEN=액세스 토큰이 유효하지 않습니다.
INVALID_REFRESH_TOKEN=리프레시 토큰이 유효하지 않습니다.
INVALID_TOKEN_TYPE=토큰 유형이 유효하지 않습니다.
INVALID_REFRESH_TOKEN_TYPE=리프레시 토큰 유형이 유효하지 않습니다.
FAILED_WRONG_PASSWORD=비밀번호가 일치하지 않습니다. 다시 시도해 주세요.
FAILED_ACCOUNT_LOCKED=계정이 잠겼습니다. 고객센터에 문의해 주세요.
FAILED_ACCOUNT_NOT_FOUND=계정을 찾을 수 없습니다. 이메일을 확인해 주세요.
FAILED_CONFIRM_PASSWORD=비밀번호와 비밀번호 확인이 일치하지 않습니다.
ALREADY_USED_PASSWORD_RESET_TOKEN=이미 사용된 비밀번호 재설정 링크입니다.
ALREADY_USED_PASSWORD=새 비밀번호는 현재 비밀번호와 다르게 설정해 주세요.
SUCCESS_PASSWORD_CHANGE=비밀번호가 성공적으로 변경되었습니다.
NOT_FOUND_VERIFICATION=인증 기록을 찾을 수 없습니다. 새 인증 코드를 요청해 주세요.
EXPIRED_VERIFICATION=인증 코드가 만료되었습니다. 새 인증 코드를 요청해 주세요.
TOO_MANY_ATTEMPTS_VERIFICATION=인증 시도 횟수를 초과했습니다. 새 인증 코드를 요청해 주세요.
INVALID_VERIFICATION_CODE=인증 코드가 올바르지 않습니다.
SUCCESS_SEND_EMAIL_CODE=인증 코드가 이메일로 발송되었습니다.
SUCCESS_VERIFY_EMAIL=이메일 인증이 완료되었습니다.
NOT_EMAIL_VERIFIED=회원가입 전 이메일 인증이 필요합니다.
ALREADY_USE_EMAIL=이미 사용 중인 이메일입니다.

# Validation
REQUIRED_EMAIL=이메일은 필수 입력 값입니다.
INVALID_EMAIL_LENGTH=이메일은 255자 이하로 입력 가능합니다.
INVALID_EMAIL_FORMAT=올바른 이메일 형식으로 입력해 주세요.
REQUIRED_PASSWORD=비밀번호는 필수 입력 값입니다.
INVALID_PASSWORD_LENGTH=비밀번호는 255자 이하로 입력 가능합니다.
REQUIRED_REFRESH_TOKEN=리프레시 토큰은 필수 입력 값입니다.
INVALID_REFRESH_TOKEN_LENGTH=리프레시 토큰은 255자 이하로 입력 가능합니다.
REQUIRED_ACCOUNT_ID=계정 ID는 필수 입력 값입니다.
INVALID_ACCOUNT_ID=계정 ID가 유효하지 않습니다.
REQUIRED_NEW_PASSWORD=새 비밀번호는 필수 입력 값입니다.
INVALID_NEW_PASSWORD_LENGTH=새 비밀번호는 255자 이하로 입력 가능합니다.
REQUIRED_PASSWORD_CONFIRM=비밀번호 확인은 필수 입력 값입니다.
INVALID_PASSWORD_CONFIRM_LENGTH=비밀번호 확인은 255자 이하로 입력 가능합니다.
REQUIRED_CODE=인증 코드는 필수 입력 값입니다.
INVALID_CODE_LENGTH=인증 코드는 8자리로 입력해 주세요.
REQUIRED_ACCESS_TOKEN=액세스 토큰은 필수 입력 값입니다.
INVALID_ACCESS_TOKEN_LENGTH=액세스 토큰이 유효하지 않습니다.

# Mail Template - Join
JOIN_SUBJECT=[Univs] 요청하신 인증번호를 확인해 주세요.
JOIN_TITLE=회원가입을 위한 인증번호 안내
JOIN_1=서비스 이용을 위해 본인 확인이 필요합니다.
JOIN_2=아래의 인증번호 8자리를 인증 화면에 입력해 주세요.
JOIN_3=본 인증번호는 발송 후 5분 동안만 유효합니다.
JOIN_4=요청하신 적이 없다면 이 메일을 무시해 주세요.
JOIN_5=보안을 위해 인증번호를 타인에게 공유하지 마세요.
JOIN_6=감사합니다.
JOIN_7=Univs 팀 드림.

