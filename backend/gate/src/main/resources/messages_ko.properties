# Swagger
UNAUTHORIZED=인증 없이 요청을 시도했습니다.
NEED_SERVICE_ROLE=서비스를 사용할 권한이 필요합니다.
NOT_FOUND=잘못된 접근 요청 정보입니다. 요청 정보를 다시 확인해 주시기 바랍니다.
METHOD_NOT_ALLOWED=지원하지 않은 요청입니다. 요청 정보를 다시 확인해 주시기 바랍니다.
INTERNAL_SERVER_ERROR=유니버스 플랫폼에서 오류가 발생하였습니다.

# Exception
INVALID_INPUT=유효하지 않은 값이 포함된 사용자의 요청입니다.
PROJECT_ALREADY_EXISTS=프로젝트가 이미 생성되어 사용중입니다.
PROJECT_NOT_FOUND=프로젝트를 찾을 수 없습니다.
NOT_OWNERSHIP=프로젝트에 접근할 수 있는 권한이 없습니다.
API_KEY_NOT_FOUND=API KEY 를 찾을 수 없습니다.
SETTINGS_NOT_FOUND=프로젝트 설정을 찾을 수 없습니다.
COMPANY_ALREADY_EXISTS=이미 기업 정보가 등록되어 있습니다.
COMPANY_NOT_FOUND=기업 정보를 찾을 수 없습니다.
WEBHOOK_CONFIG_NOT_FOUND=웹훅 설정을 찾을 수 없습니다.
PACKAGE_KEY_NOT_ALLOWED=패키지 키는 External 타입 프로젝트에서만 설정할 수 있습니다.
PROJECT_MODULE_TYPE_IMMUTABLE=프로젝트 모듈 타입은 생성 후 변경할 수 없습니다.
UNSUPPORTED_MODULE_TYPE=Face 모듈 타입 프로젝트에서만 사용 가능한 기능입니다.
DEMO_DISABLED=데모 기능이 비활성화된 프로젝트입니다.
SDK_DISABLED=SDK 기능이 비활성화된 프로젝트입니다.

# JWT
EXPIRATION_TOKEN=토큰이 만료되었습니다. 다시 로그인해 주세요.
INVALID_TOKEN=토큰이 유효하지 않습니다.

# Project
REQUIRED_PROJECT_NAME=프로젝트 이름은 필수 입력 값입니다.
INVALID_PROJECT_NAME_LENGTH=프로젝트 이름은 1~255 자 입력 가능합니다.
INVALID_PROJECT_DESCRIPTION_LENGTH=프로젝트 설명은 1~1000 자 입력 가능합니다.
INVALID_COMPANY_NAME_LENGTH=기업 이름은 1~100자 입력 가능합니다.
INVALID_BUSINESS_NUMBER_LENGTH=기업 식별자는 1~20자 입력 가능합니다.
INVALID_MANAGER_MAIL_LENGTH=담당자 메일은 1~100자 입력 가능합니다.
INVALID_MANAGER_NAME_LENGTH=담당자 이름은 1~100자 입력 가능합니다.
INVALID_MANAGER_NUMBER_LENGTH=담당자 전화번호는 1~100자 입력 가능합니다.
INVALID_PAGE_COUNT=페이징 관련 설정 값 은(는) 1 ~ 1000 사이의 값으로 설정 가능합니다.
PROJECT_LIMIT_EXCEEDED=프로젝트는 최대 10개까지만 생성할 수 있습니다.
REQUIRED_PROJECT_TYPE=프로젝트 타입은 필수 입력 값입니다.
INVALID_PROJECT_TYPE=유효하지 않은 프로젝트 타입입니다. (ex. STANDARD | EXTERNAL)
REQUIRED_PROJECT_MODULE_TYPE=프로젝트 모듈 타입은 필수 입력 값입니다.
INVALID_PROJECT_MODULE_TYPE=유효하지 않은 프로젝트 모듈 타입입니다. (ex. FACE | PALM)
REQUIRED_PACKAGE_KEY=패키지 키는 필수 입력 값입니다.
INVALID_PACKAGE_KEY_LENGTH=패키지 키는 99자 이하로 입력 가능합니다.

# Mail
