JOIN_3=본 인증번호는 발송 후 5분 동안만 유효합니다.
JOIN_4=요청하신 적이 없다면 이 메일을 무시해 주세요.
JOIN_5=보안을 위해 인증번호를 타인에게 공유하지 마세요.
JOIN_6=감사합니다.
JOIN_7=Univs Gate 팀 드림.

