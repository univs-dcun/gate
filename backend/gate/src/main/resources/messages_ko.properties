INVALID_USER_ID_VALUE=사용자 ID가 유효하지 않습니다.
INVALID_TRANSACTION_UUID_LENGTH=트랜잭션 UUID는 36자 이하로 입력 가능합니다.

# Billing - 구독 & 플랜
PLAN_NOT_FOUND=요청한 플랜을 찾을 수 없습니다.
SUBSCRIPTION_NOT_FOUND=구독 정보를 찾을 수 없습니다.
SUBSCRIPTION_ALREADY_EXISTS=이미 활성화된 구독이 존재합니다.

# Billing - 크레딧 & 한도
CREDIT_BALANCE_NOT_FOUND=크레딧 잔액 정보를 찾을 수 없습니다.
FEATURE_LIMIT_NOT_FOUND=기능 한도 정보를 찾을 수 없습니다.
INSUFFICIENT_PLAN_CREDIT=플랜 크레딧이 부족합니다.
INSUFFICIENT_FLEX_CREDIT=Flex 크레딧이 부족합니다.
FEATURE_LIMIT_EXCEEDED=기능 사용 한도를 초과했습니다. 한도를 재설정하거나 Flex 크레딧을 충전해 주세요.
