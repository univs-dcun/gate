RESET_PASSWORD_2=아래의 인증번호 8자리를 인증 화면에 입력해 주세요.
RESET_PASSWORD_3=본 인증번호는 발송 후 5분 동안만 유효합니다.
RESET_PASSWORD_4=요청하신 적이 없다면 이 메일을 무시해 주세요.
RESET_PASSWORD_5=보안을 위해 인증번호를 타인에게 공유하지 마세요.
RESET_PASSWORD_6=감사합니다.
RESET_PASSWORD_7=Univs Gate 팀 드림.

REQUIRED_TO=받는 사람('to') 은(는) 필수 입력 값 입니다.
INVALID_TO_LENGTH=받는 사람('to') 은(는) 문자열 1~255자 입력 가능합니다.
REQUIRED_SUBJECT=제목('subject') 은(는) 필수 입력 값 입니다.
INVALID_SUBJECT_LENGTH=제목('subject') 은(는) 문자열 1~255자 입력 가능합니다.
REQUIRED_BODY=내용('body') 은(는) 필수 입력 값 입니다.
INVALID_BODY_LENGTH=내용('body') 은(는) 문자열 1~255자 입력 가능합니다.

# User
INVALID_USER=사용자 정보가 유효하지 않습니다.

# File
INVALID_FILE=업로드된 파일이 유효하지 않습니다.
INVALID_FILE_PATH=파일 경로가 유효하지 않습니다.
REQUIRED_FILE_NAME=파일 이름은 필수 입력 값입니다.
REQUIRED_EXTENSION=파일 확장자는 필수 입력 값입니다.
FAILURE_COMPRESSION_FILE=파일 압축에 실패했습니다.

# Match
NOT_FOUND_MATCHING_HISTORY=매칭 이력을 찾을 수 없습니다.
NOT_MATCH=얼굴이 일치하지 않습니다.
MISMATCH=얼굴 매칭 결과가 불일치합니다.
INVALID_MATCH_TYPE_CONDITION=유효하지 않은 매칭 타입입니다. (ex. REGISTER | VERIFY | IDENTIFY | LIVENESS | ALL)
INVALID_MATCHING_RESULT_SEARCH_CONDITION=유효하지 않은 매칭 결과 타입입니다. (ex. SUCCESS | FAILURE | ALL)

# Liveness
FACE_NOT_FOUND=이미지에서 얼굴을 찾을 수 없습니다.
TOO_MANY_FACES=이미지에 두 개 이상의 얼굴이 있습니다.
SMALL_FACE_SIZE=얼굴 크기가 너무 작습니다.
SMALL_RELATIVE_FACE_SIZE=얼굴의 상대적인 크기가 너무 작습니다.
SMALL_PUPILLARY_DISTANCE=동공 간 거리가 너무 짧습니다.
LARGE_FACE_ROTATION_ANGLE=머리(얼굴)의 회전 각도가 너무 큽니다.
FACE_TOO_CLOSE=얼굴이 카메라에 너무 가깝습니다.
FACE_CLOSE_TO_BORDER=얼굴이 이미지 가장자리에 너무 가깝습니다.
FACE_CROPPED=얼굴이 잘렸습니다.
FACE_OCCLUDED=얼굴이 가려졌습니다. (예: 의료용 마스크)
EYES_CLOSED=눈이 감겨 있습니다.
DARK_IMAGE=이미지가 너무 어둡습니다.
FAKE=실제 얼굴 이미지로 확인되지 않습니다. 다시 시도해 주시기 바랍니다.
FACE_IS_OCCLUDED=얼굴이 가려졌습니다.
FACE_TOO_SMALL=얼굴 이미지가 너무 작습니다.
FACE_ANGLE_TOO_LARGE=얼굴의 회전 각도가 너무 큽니다.

# Demo
INVALID_QR_CODE=유효하지 않은 QR 코드입니다.
EXPIRED_QR_CODE=만료된 QR 코드입니다. 새 QR 코드를 요청해 주세요.

