INVALID_MAIN_SERVICE_LENGTH=주요 서비스는 100자 이하로 입력 가능합니다.
INVALID_BUSINESS_TYPE_LENGTH=기업 유형은 100자 이하로 입력 가능합니다.
INVALID_EMPLOYEE_COUNT_LENGTH=직원 수는 100자 이하로 입력 가능합니다.

# User / Match
REQUIRED_FACE_ID=Face ID는 필수 입력 값입니다.
INVALID_FACE_ID_LENGTH=Face ID는 255자 이하로 입력 가능합니다.
INVALID_DESCRIPTION_LENGTH=설명은 1000자 이하로 입력 가능합니다.
