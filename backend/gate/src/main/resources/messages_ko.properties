INVALID_REALLOCATION_AMOUNT=재분배 횟수가 유효하지 않습니다.

# Billing - DB 저장 용량
DB_STORAGE_LIMIT_EXCEEDED=저장 데이터 규모 한도를 초과했습니다. Storage Expansion 을 통해 한도를 늘려 주세요.

# Billing - Flex 충전
INVALID_FLEX_CHARGE_AMOUNT=충전 금액은 10,000원 이상이며 10,000원 단위로 입력해야 합니다.

# Billing - 프로젝트 플랜 정책
FREE_PLAN_PROJECT_LIMIT_EXCEEDED=FREE 플랜 프로젝트는 회사당 최대 10개까지 생성할 수 있습니다.
PROJECT_HAS_ACTIVE_SUBSCRIPTION=환불 또는 추가 정산이 필요할 수 있는 플랜의 프로젝트입니다. 진행하시려면 관리자에게 문의해주세요.

FLEX_CHARGE_ORDER_NOT_FOUND=충전 주문을 찾을 수 없습니다.
FLEX_CHARGE_ALREADY_PROCESSED=이미 처리된 충전 주문입니다.
PORTONE_PAYMENT_VERIFICATION_FAILED=결제 검증에 실패했습니다. 결제 상태를 확인해 주세요.
